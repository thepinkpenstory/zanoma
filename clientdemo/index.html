<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zanoma · Nucleus · Client Demo</title>
<meta name="description" content="Live preview of the Nucleus client dashboard. Switch personas to see Nucleus, AI Inside Sales, and Engine tiers in action.">
<meta name="robots" content="index, follow">
<link rel="icon" href="/favicon.ico" type="image/x-icon">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --bg2: #0f0f17;
  --bg3: #13131e;
  --bg4: #181822;
  --text: #f0f0f5;
  --text-dim: #a0a0b0;
  --text-muted: #606070;
  --green: #39ff14;
  --green-dim: rgba(57,255,20,0.15);
  --green-soft: rgba(57,255,20,0.06);
  --green-glow: 0 0 30px rgba(57,255,20,0.3);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --orange: #fb923c;
  --orange-dim: rgba(251,146,60,0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.15);
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-pill: 999px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
h1,h2,h3,h4,h5 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: -0.5px; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
code, pre { font-family: 'Menlo', 'SF Mono', monospace; font-size: 13px; }

/* === DEMO BANNER (sits above the switcher, full-width, unmistakable) === */
.demo-banner { background: var(--bg2); border-bottom: 1px solid var(--green); padding: 12px 24px; display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap; text-align: center; font-family: 'Space Grotesk', sans-serif; font-size: 13px; color: var(--text-dim); letter-spacing: 0.3px; position: relative; overflow: hidden; }
.demo-banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--green), transparent); animation: shine 4s ease-in-out infinite; }
@keyframes shine { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
.demo-banner b { color: var(--green); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.demo-banner span.divider { color: var(--text-muted); }

/* === PERSONA SWITCHER === */

.switcher-wrap { background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%); border-bottom: 1px solid var(--border); padding: 24px 0 32px; }
.switcher-inner { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
.switcher-heading { text-align: center; margin-bottom: 22px; }
.switcher-h-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; color: var(--green); margin-bottom: 8px; font-family: 'Space Grotesk', sans-serif; }
.switcher-h-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(22px, 3vw, 32px); letter-spacing: -0.5px; color: var(--text); margin-bottom: 6px; }
.switcher-h-sub { font-size: 14px; color: var(--text-dim); max-width: 640px; margin: 0 auto; line-height: 1.5; }
.switcher-h-sub b { color: var(--text); font-weight: 500; }
.switcher-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.persona-sample-tag { font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; padding: 3px 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-pill); }
.persona-card.active .persona-sample-tag { color: var(--green); background: var(--green-dim); border-color: var(--green); }
.persona-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px 22px; text-align: left; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 12px; }
.persona-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.persona-card.active { border-color: var(--green); background: linear-gradient(180deg, rgba(57,255,20,0.04) 0%, var(--bg2) 100%); box-shadow: 0 0 0 1px var(--green), 0 0 40px rgba(57,255,20,0.12); }
.persona-card.active::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--green); }
.persona-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.persona-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 20px; }
.persona-card.active .persona-icon { background: var(--green-dim); border-color: var(--green); }
.persona-tier { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 0.5px; color: var(--text-dim); padding: 4px 9px; border-radius: var(--radius-pill); border: 1px solid var(--border); background: var(--bg3); white-space: nowrap; }
.persona-tier b { color: var(--text); font-weight: 700; }
.persona-card.active .persona-tier { color: var(--green); border-color: var(--green); background: var(--green-dim); }
.persona-card.active .persona-tier b { color: var(--green); }
.persona-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; color: var(--text); letter-spacing: -0.5px; line-height: 1.15; }
.persona-meta { font-size: 13px; color: var(--text-dim); display: flex; flex-direction: column; gap: 2px; }
.persona-meta b { color: var(--text); font-weight: 500; }
.persona-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.persona-card.active .persona-status { color: var(--green); }
.persona-hires-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-top: 4px; }
.persona-hires { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.3px; color: var(--text); }
.persona-card.tier-nucleus .persona-hires { color: var(--text-dim); }
.persona-card.tier-inside_sales .persona-hires { color: #fb923c; }
.persona-card.tier-engine .persona-hires { color: var(--green); text-shadow: 0 0 18px rgba(57,255,20,0.45); }
.persona-price { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; color: var(--text-muted); letter-spacing: 0.2px; }
.persona-card.active .persona-price { color: var(--text); }
.persona-pitch { font-size: 13.5px; color: var(--text-dim); line-height: 1.45; min-height: 58px; }
.persona-card.active .persona-pitch { color: var(--text); }
.persona-divider { height: 1px; background: var(--border); margin: 4px 0 0; }
.tier-contrast-strip { margin-top: 24px; display: flex; align-items: stretch; justify-content: center; gap: 12px; padding: 18px 22px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
.tier-contrast-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 4px 8px; }
.tier-contrast-item:nth-child(1) .tcs-num { color: var(--text-dim); }
.tier-contrast-item:nth-child(3) .tcs-num { color: #fb923c; }
.tier-contrast-item:nth-child(5) .tcs-num { color: var(--green); text-shadow: 0 0 24px rgba(57,255,20,0.5); }
.tcs-num { font-family: 'Space Grotesk', sans-serif; font-size: 36px; font-weight: 700; line-height: 1; letter-spacing: -1px; }
.tcs-lbl { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
.tcs-desc { font-size: 12.5px; color: var(--text-dim); margin-top: 4px; text-align: center; }
.tier-contrast-arrow { display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 22px; font-family: 'Space Grotesk', sans-serif; }
@media (max-width: 760px) {
  .tier-contrast-strip { flex-direction: column; gap: 12px; }
  .tier-contrast-arrow { transform: rotate(90deg); }
}
.live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* === DEMO BADGE === */

.demo-badge { position: fixed; top: 16px; right: 16px; z-index: 100; background: var(--bg2); border: 1px solid var(--green); color: var(--green); padding: 8px 14px; border-radius: var(--radius-pill); font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.demo-badge .live-dot { background: var(--green); }

/* === LAYOUT === */

.app-shell { max-width: 1400px; margin: 0 auto; padding: 32px 24px; display: grid; grid-template-columns: 240px 1fr; gap: 32px; }
.sidebar { position: sticky; top: 24px; align-self: start; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 0; height: fit-content; }
.side-section { padding: 12px 16px 4px; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; }
.side-link { display: flex; align-items: center; gap: 10px; padding: 9px 16px; margin: 1px 8px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--text-dim); cursor: pointer; transition: all 0.15s; position: relative; }
.side-link:hover { background: var(--bg3); color: var(--text); }
.side-link.active { background: var(--green-dim); color: var(--green); }
.side-link.active .side-icon { color: var(--green); }
.side-icon { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-muted); }
.side-link .side-badge { margin-left: auto; font-size: 11px; font-weight: 700; background: var(--green); color: var(--bg); padding: 1px 7px; border-radius: var(--radius-pill); }
.side-link.locked { opacity: 0.5; cursor: not-allowed; }
.side-link.locked .lock { margin-left: auto; font-size: 12px; color: var(--text-muted); }

/* === TOPBAR === */

.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.live-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--green-dim); border: 1px solid var(--green-dim); border-radius: var(--radius-pill); font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--green); }
.topbar-business { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.avatar { width: 36px; height: 36px; background: var(--bg3); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); }

/* === SHARED PAGE BITS === */

.eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--green); padding: 6px 12px; border: 1px solid var(--green-dim); border-radius: var(--radius-pill); background: var(--green-dim); margin-bottom: 18px; }
.hero-h1 { font-size: clamp(40px, 5vw, 64px); letter-spacing: -2px; line-height: 1.05; margin-bottom: 14px; }
.hero-sub { font-size: 19px; color: var(--text-dim); margin-bottom: 36px; max-width: 720px; }
.hero-sub b { color: var(--text); }
.section-h { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 16px; }
.section-h-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.section-sub { font-size: 13px; color: var(--text-muted); }
.page-h2 { font-size: clamp(28px, 3.6vw, 44px); margin-bottom: 12px; letter-spacing: -1px; }
.page-lede { font-size: 17px; color: var(--text-dim); margin-bottom: 32px; max-width: 760px; line-height: 1.55; }

/* === SCOREBOARD CARDS === */

.scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 44px; }
.score-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 8px; min-height: 150px; }
.score-card:hover { border-color: var(--green); transform: translateY(-2px); }
.score-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; }
.score-value { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 32px; letter-spacing: -1px; color: var(--text); display: flex; align-items: baseline; gap: 8px; }
.score-arrow { font-size: 20px; }
.score-arrow.up { color: var(--green); }
.score-arrow.down { color: var(--orange); }
.score-arrow.flat { color: var(--text-muted); }
.score-spark { flex: 1; min-height: 36px; margin-top: 4px; margin-left: -4px; margin-right: -4px; }
.score-foot { font-size: 12px; color: var(--text-muted); }

/* === HIGHLIGHTS === */

.highlights { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 32px; }
.highlight-row { display: flex; gap: 18px; padding: 16px 0; border-bottom: 1px solid var(--border); }
.highlight-row:last-child { border-bottom: none; padding-bottom: 0; }
.highlight-row:first-of-type { padding-top: 4px; }
.highlight-num { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; background: var(--green-dim); border: 1px solid var(--green); color: var(--green); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; }
.highlight-body { flex: 1; }
.highlight-headline { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.45; }
.highlight-detail { font-size: 14px; color: var(--text-dim); }

/* === ADVISOR CARD === */

.advisor-card { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: var(--radius); padding: 24px 28px; margin-bottom: 36px; display: flex; gap: 18px; align-items: flex-start; }
.advisor-photo { width: 48px; height: 48px; background: var(--bg3); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); flex-shrink: 0; }
.advisor-text { font-size: 17px; font-style: italic; color: var(--text); line-height: 1.55; margin-bottom: 8px; }
.advisor-name { font-size: 13px; font-weight: 600; color: var(--green); font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.3px; font-style: normal; }

/* === BUTTONS === */

.ctas { display: flex; gap: 12px; flex-wrap: wrap; }
.btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 14px 24px; background: var(--green); color: var(--bg); font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; border-radius: var(--radius-sm); transition: all 0.2s; letter-spacing: 0.3px; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--green-glow); }
.btn-outline { display: inline-flex; align-items: center; gap: 8px; padding: 13px 22px; background: transparent; border: 1px solid var(--border-strong); color: var(--text); font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; border-radius: var(--radius-sm); transition: all 0.2s; }
.btn-outline:hover { border-color: var(--green); color: var(--green); }
.btn-danger { display: inline-flex; align-items: center; gap: 8px; padding: 13px 22px; background: transparent; border: 1px solid var(--red); color: var(--red); font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; border-radius: var(--radius-sm); transition: all 0.2s; }
.btn-danger:hover { background: var(--red-dim); }

/* === TOAST === */

.toast { position: fixed; right: 16px; bottom: 16px; z-index: 200; background: var(--bg2); border: 1px solid var(--green); border-left: 4px solid var(--green); border-radius: var(--radius-sm); padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(57,255,20,0.15); animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2); max-width: 380px; }
@keyframes slideUp { from { transform: translateY(120px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.toast-icon { font-size: 22px; color: var(--green); }
.toast-body { flex: 1; }
.toast-title { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 1px; }
.toast-text { font-size: 13px; color: var(--text-dim); }

/* === BRIEF ARCHIVE — two-pane === */

.brief-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
.brief-stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; }
.brief-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; margin-bottom: 6px; }
.brief-stat-value { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 24px; color: var(--text); }
.brief-stat-value.green { color: var(--green); }

.brief-pane-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
.brief-list { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; max-height: 1100px; overflow-y: auto; position: sticky; top: 24px; }
.brief-list::-webkit-scrollbar { width: 6px; }
.brief-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
.brief-list-head { padding: 16px 18px; border-bottom: 1px solid var(--border); background: var(--bg3); position: sticky; top: 0; z-index: 1; }
.brief-list-h-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; color: var(--text); margin-bottom: 2px; }
.brief-list-h-sub { font-size: 11px; color: var(--text-muted); }
.brief-li { padding: 14px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; }
.brief-li:hover { background: var(--bg3); }
.brief-li.active { background: var(--bg3); border-left-color: var(--green); }
.brief-li.today { background: linear-gradient(180deg, rgba(57,255,20,0.04) 0%, transparent 100%); }
.brief-li-date { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
.brief-li.today .brief-li-date { color: var(--green); }
.brief-li.active .brief-li-date { color: var(--green); }
.brief-li-headline { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
.brief-li-snap { font-size: 11px; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.3px; }
.brief-li-tag { display: inline-block; padding: 1px 7px; border-radius: var(--radius-pill); font-size: 9px; font-weight: 700; letter-spacing: 0.5px; font-family: 'Space Grotesk', sans-serif; margin-right: 6px; vertical-align: middle; text-transform: uppercase; }
.brief-li-tag.full { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.brief-li-tag.weekly { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }

.brief-detail { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 40px; }
.brief-d-header { padding-bottom: 22px; margin-bottom: 26px; border-bottom: 1px solid var(--border); }
.brief-d-meta { display: flex; align-items: center; gap: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--green); text-transform: uppercase; margin-bottom: 14px; flex-wrap: wrap; }
.brief-d-meta .dot { color: var(--text-muted); }
.brief-d-meta-r { font-weight: 500; color: var(--text-muted); letter-spacing: 0.5px; }
.brief-d-greeting { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(28px, 4vw, 42px); letter-spacing: -1.5px; line-height: 1.05; margin-bottom: 0; }

.brief-d-tldr { background: var(--bg3); border-left: 4px solid var(--green); padding: 18px 22px; margin-bottom: 32px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.brief-d-tldr-label { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--green); text-transform: uppercase; margin-bottom: 6px; }
.brief-d-tldr-text { font-size: 16px; color: var(--text); line-height: 1.55; font-weight: 500; }

.brief-d-section { margin-bottom: 32px; }
.brief-d-section-h { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

.brief-d-exec { font-size: 15px; color: var(--text-dim); line-height: 1.7; }
.brief-d-exec b { color: var(--text); font-weight: 500; }

.brief-d-mini-score { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 32px; }
.bms-cell { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; }
.bms-name { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; margin-bottom: 4px; }
.bms-val { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); display: flex; align-items: baseline; justify-content: center; gap: 4px; }
.bms-arrow { font-size: 11px; }
.bms-arrow.up { color: var(--green); }
.bms-arrow.down { color: var(--orange); }
.bms-arrow.flat { color: var(--text-muted); }

.brief-d-hl { display: flex; gap: 18px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
.brief-d-hl:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
.brief-d-hl-num { flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%; background: var(--green-dim); border: 1.5px solid var(--green); color: var(--green); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; }
.brief-d-hl-body { flex: 1; }
.brief-d-hl-headline { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: var(--text); line-height: 1.35; margin-bottom: 10px; letter-spacing: -0.3px; }
.brief-d-hl-text { font-size: 14px; color: var(--text-dim); line-height: 1.7; }
.brief-d-hl-text p { margin-bottom: 10px; }
.brief-d-hl-text p:last-child { margin-bottom: 0; }
.brief-d-hl-text b { color: var(--text); font-weight: 500; }
.brief-d-hl-text .pill-mark { display: inline-block; padding: 1px 7px; background: var(--bg3); border-radius: var(--radius-pill); font-size: 12px; color: var(--text); font-family: 'Menlo', monospace; }

.brief-d-numbers { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.brief-d-num-row { display: grid; grid-template-columns: 2fr 1fr 1fr 0.8fr; gap: 12px; padding: 11px 18px; border-bottom: 1px solid var(--border); align-items: center; font-size: 13px; }
.brief-d-num-row.head { background: var(--bg4); font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; padding: 9px 18px; }
.brief-d-num-row:last-child { border-bottom: none; }
.bn-label { color: var(--text-dim); }
.bn-val { font-family: 'Space Grotesk', sans-serif; font-weight: 600; color: var(--text); text-align: right; }
.bn-delta { font-family: 'Space Grotesk', sans-serif; font-weight: 700; text-align: right; font-size: 13px; }
.bn-delta.up { color: var(--green); }
.bn-delta.down { color: var(--orange); }
.bn-delta.flat { color: var(--text-muted); }

.brief-d-radar { display: flex; flex-direction: column; gap: 10px; }
.brief-d-radar-row { display: flex; gap: 12px; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); align-items: flex-start; }
.brief-d-radar-icon { font-size: 16px; flex-shrink: 0; }
.brief-d-radar-text { font-size: 13px; color: var(--text-dim); line-height: 1.55; }
.brief-d-radar-text b { color: var(--text); font-weight: 500; }

.brief-d-advisor { background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 22px 26px; }
.brief-d-advisor-text { font-size: 15px; color: var(--text); line-height: 1.65; font-style: italic; }
.brief-d-advisor-text p { margin-bottom: 12px; }
.brief-d-advisor-text p:last-child { margin-bottom: 0; }
.brief-d-advisor-attrib { display: flex; align-items: center; gap: 10px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
.brief-d-advisor-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; color: var(--green); letter-spacing: 0.5px; }
.brief-d-advisor-role { font-size: 12px; color: var(--text-muted); }

.brief-d-watch { display: flex; flex-direction: column; gap: 8px; }
.brief-d-watch-row { display: flex; gap: 12px; align-items: flex-start; font-size: 13px; color: var(--text-dim); line-height: 1.55; padding-left: 4px; }
.brief-d-watch-bullet { color: var(--green); flex-shrink: 0; padding-top: 1px; }

.brief-d-foot { padding-top: 22px; margin-top: 22px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.3px; }
.brief-d-foot-conn { display: flex; gap: 8px; align-items: center; }
.brief-d-foot-conn b { color: var(--green); font-weight: 600; }

/* === AUDIO PLAYER (Brand Voice — real speechSynthesis) === */
.voice-audio-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 20px; display: flex; align-items: center; gap: 16px; transition: all 0.2s; }
.voice-audio-card:hover { border-color: var(--border-strong); }
.voice-audio-card.playing { border-color: var(--green); background: linear-gradient(180deg, var(--green-soft) 0%, var(--bg3) 100%); }
.voice-audio-play { width: 44px; height: 44px; background: var(--green); color: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; flex-shrink: 0; font-size: 14px; border: 2px solid var(--green); }
.voice-audio-play:hover { transform: scale(1.06); box-shadow: var(--green-glow); }
.voice-audio-play.playing { background: var(--bg); color: var(--green); }
.voice-audio-body { flex: 1; min-width: 0; }
.voice-audio-context { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--green); font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; margin-bottom: 4px; }
.voice-audio-text { font-size: 14px; color: var(--text); line-height: 1.45; }
.voice-audio-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.3px; }
.voice-wave { display: flex; align-items: center; gap: 2px; height: 28px; flex-shrink: 0; padding: 0 8px; }
.voice-wave-bar { width: 3px; background: var(--text-muted); border-radius: 2px; height: 6px; transition: height 0.2s, background 0.2s; }
.voice-audio-card.playing .voice-wave-bar { background: var(--green); }
.voice-audio-card.playing .voice-wave-bar:nth-child(1) { animation: wave 0.9s ease-in-out infinite; animation-delay: 0s; }
.voice-audio-card.playing .voice-wave-bar:nth-child(2) { animation: wave 0.9s ease-in-out infinite; animation-delay: 0.15s; }
.voice-audio-card.playing .voice-wave-bar:nth-child(3) { animation: wave 0.9s ease-in-out infinite; animation-delay: 0.3s; }
.voice-audio-card.playing .voice-wave-bar:nth-child(4) { animation: wave 0.9s ease-in-out infinite; animation-delay: 0.45s; }
.voice-audio-card.playing .voice-wave-bar:nth-child(5) { animation: wave 0.9s ease-in-out infinite; animation-delay: 0.6s; }
@keyframes wave { 0%, 100% { height: 6px; } 50% { height: 24px; } }
.voice-audio-disclaimer { font-size: 11px; color: var(--text-muted); padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-top: 16px; line-height: 1.5; font-style: italic; }

/* === CUSTOMER VIEW (what the patient sees) === */
.cust-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.cust-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
.cust-card-h { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; margin-bottom: 6px; }
.cust-card-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.phone-frame { background: #000; border: 8px solid #1a1a1a; border-radius: 32px; padding: 14px 14px 18px; max-width: 280px; margin: 0 auto; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
.phone-screen { background: linear-gradient(180deg, #0a0a0a 0%, #1a1a2e 100%); border-radius: 22px; padding: 24px 16px; min-height: 420px; }
.callerid-status { font-size: 10px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 20px; letter-spacing: 1px; font-family: 'Space Grotesk', sans-serif; }
.callerid-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; color: white; text-align: center; margin-bottom: 6px; letter-spacing: -0.5px; }
.callerid-num { font-size: 14px; color: rgba(255,255,255,0.6); text-align: center; margin-bottom: 8px; }
.callerid-tag { font-size: 11px; color: var(--green); text-align: center; margin-bottom: 32px; padding: 4px 10px; background: rgba(57,255,20,0.1); border: 1px solid rgba(57,255,20,0.3); border-radius: 999px; display: inline-block; left: 50%; position: relative; transform: translateX(-50%); }
.callerid-actions { display: flex; gap: 24px; justify-content: center; align-items: center; padding: 24px 0; margin-top: 80px; }
.callerid-btn { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.callerid-btn.decline { background: #dc2626; color: white; }
.callerid-btn.accept { background: var(--green); color: var(--bg); }

.sms-thread { background: var(--bg); padding: 20px 16px; border-radius: 22px; min-height: 420px; }
.sms-h { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; color: white; text-align: center; padding-bottom: 12px; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sms-bubble { padding: 10px 14px; border-radius: 18px; max-width: 78%; font-size: 13px; line-height: 1.4; margin-bottom: 8px; }
.sms-bubble.them { background: #2c2c2e; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
.sms-bubble.me { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.sms-row { display: flex; flex-direction: column; margin-bottom: 4px; }
.sms-row.me { align-items: flex-end; }
.sms-row.them { align-items: flex-start; }
.sms-time { font-size: 10px; color: rgba(255,255,255,0.4); margin: 4px 8px; }

/* === BOOKKEEPER DEEP DIVE === */
.book-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; margin-bottom: 24px; }
.book-coa { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.book-coa-h { padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--bg3); font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; }
.book-coa-row { padding: 10px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 13px; cursor: pointer; transition: background 0.15s; }
.book-coa-row:hover { background: var(--bg3); }
.book-coa-row.active { background: var(--bg3); border-left: 3px solid var(--green); padding-left: 15px; }
.book-coa-row.flagged { background: rgba(251,146,60,0.05); }
.book-coa-name { color: var(--text); }
.book-coa-amt { font-family: 'Space Grotesk', sans-serif; font-weight: 600; color: var(--text-dim); }
.book-coa-amt.flagged { color: var(--orange); }
.book-detail { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
.book-detail-h { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 6px; }
.book-detail-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 18px; }
.book-tx-list { background: var(--bg3); border-radius: var(--radius-sm); padding: 4px 0; margin-bottom: 18px; }
.book-tx-row { padding: 10px 16px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1.5fr 0.8fr 0.8fr; gap: 10px; font-size: 13px; align-items: center; }
.book-tx-row:last-child { border-bottom: none; }
.book-tx-flag { background: rgba(251,146,60,0.1); border-left: 3px solid var(--orange); padding-left: 13px; }
.book-tx-date { color: var(--text-muted); font-size: 12px; font-family: 'Space Grotesk', sans-serif; }
.book-tx-desc { color: var(--text); }
.book-tx-amt { font-family: 'Space Grotesk', sans-serif; font-weight: 600; text-align: right; }
.book-tx-margin { font-family: 'Space Grotesk', sans-serif; font-weight: 700; text-align: right; }
.book-tx-margin.warn { color: var(--orange); }
.book-tx-margin.ok { color: var(--green); }
.book-month-end { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: var(--radius-sm); margin-top: 16px; flex-wrap: wrap; gap: 12px; }
.book-month-end-label { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; color: var(--green); text-transform: uppercase; }
.book-month-end-val { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: var(--text); margin-top: 4px; }
.book-month-end-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* === ONBOARDING TIMELINE === */
.onb-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 36px; }
.onb-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.onb-eyebrow { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--green); text-transform: uppercase; margin-bottom: 6px; }
.onb-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.5px; }
.onb-progress { display: flex; align-items: center; gap: 10px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; color: var(--green); padding: 6px 14px; background: var(--green-dim); border: 1px solid var(--green); border-radius: var(--radius-pill); }
.onb-progress-bar { width: 100%; height: 6px; background: var(--bg3); border-radius: 3px; margin-bottom: 22px; overflow: hidden; }
.onb-progress-fill { height: 100%; background: linear-gradient(90deg, var(--green) 0%, rgba(57,255,20,0.5) 100%); border-radius: 3px; transition: width 0.6s; }
.onb-stages { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.onb-stage { padding: 16px 18px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); position: relative; }
.onb-stage.done { border-color: var(--green); background: var(--green-soft); }
.onb-stage.current { border-color: var(--green); background: linear-gradient(180deg, rgba(57,255,20,0.06) 0%, var(--bg3) 100%); box-shadow: 0 0 30px rgba(57,255,20,0.1); }
.onb-stage-label { font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
.onb-stage.done .onb-stage-label { color: var(--green); }
.onb-stage.current .onb-stage-label { color: var(--green); }
.onb-stage-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 6px; }
.onb-stage-desc { font-size: 12px; color: var(--text-dim); line-height: 1.45; }
.onb-stage-icon { position: absolute; top: 12px; right: 12px; font-size: 14px; color: var(--green); }

/* === ADVISOR RESPONSE TIME TICKER === */
.advisor-sla-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 24px; }
.advisor-sla-h { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
.advisor-sla-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-family: 'Space Grotesk', sans-serif; font-size: 13px; }
.advisor-sla-pill { padding: 4px 11px; background: var(--green-dim); border: 1px solid var(--green); color: var(--green); border-radius: var(--radius-pill); font-weight: 700; font-size: 12px; }
.advisor-sla-meta { font-size: 12px; color: var(--text-dim); margin-top: 8px; }

/* === ACTIVATION BREAKDOWN (Engine billing) === */
.activation-card { background: var(--bg2); border: 1.5px solid var(--green); border-radius: var(--radius); padding: 28px; margin-top: 24px; box-shadow: 0 0 40px rgba(57,255,20,0.06); }
.activation-h { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; margin-bottom: 6px; }
.activation-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
.activation-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 18px; }
.activation-item { padding: 14px 18px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); }
.activation-item-label { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.2px; color: var(--green); text-transform: uppercase; margin-bottom: 4px; }
.activation-item-text { font-size: 13px; color: var(--text); margin-bottom: 4px; line-height: 1.45; }
.activation-item-cost { font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: var(--text-muted); }
.activation-foot { font-size: 12px; color: var(--text-dim); padding: 12px 16px; background: var(--bg3); border-radius: var(--radius-sm); margin-top: 16px; line-height: 1.55; }
.activation-foot b { color: var(--green); }

/* === CUSTOMER PHONE FRAME (alt) === */
.cust-section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 1024px) { .book-grid, .cust-grid, .cust-section-grid { grid-template-columns: 1fr; } .onb-stages { grid-template-columns: repeat(2, 1fr); } }

/* === INLINE UPSELL CALLOUT (within Brief highlights, scoreboard, etc.) === */
.upsell-inline { margin-top: 14px; padding: 12px 16px; background: linear-gradient(180deg, rgba(57,255,20,0.05) 0%, transparent 100%); border: 1px dashed var(--green); border-radius: var(--radius-sm); display: flex; gap: 12px; align-items: flex-start; transition: all 0.2s; }
.upsell-inline:hover { background: linear-gradient(180deg, rgba(57,255,20,0.08) 0%, transparent 100%); border-style: solid; }
.upsell-inline-icon { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
.upsell-inline-body { flex: 1; font-size: 13px; color: var(--text-dim); line-height: 1.55; }
.upsell-inline-tier { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 1.5px; color: var(--green); text-transform: uppercase; margin-bottom: 4px; }
.upsell-inline-text b { color: var(--text); font-weight: 500; }
.upsell-inline-link { color: var(--green); font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; flex-shrink: 0; padding: 6px 10px; border: 1px solid var(--green); border-radius: var(--radius-pill); transition: all 0.15s; align-self: center; white-space: nowrap; }
.upsell-inline-link:hover { background: var(--green-dim); }

/* upsell footer at end of Brief — closing pitch */
.upsell-footer { margin-top: 32px; padding: 22px 26px; background: var(--bg2); border: 1.5px solid var(--green); border-radius: var(--radius); box-shadow: 0 0 40px rgba(57,255,20,0.05); }
.upsell-footer-eye { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--green); text-transform: uppercase; margin-bottom: 8px; }
.upsell-footer-h { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: -0.3px; margin-bottom: 10px; }
.upsell-footer-body { font-size: 14px; color: var(--text-dim); line-height: 1.6; margin-bottom: 14px; }
.upsell-footer-body b { color: var(--text); font-weight: 500; }
.upsell-footer-actions { display: flex; gap: 10px; flex-wrap: wrap; }

/* === REVENUE WATCH (the "what you missed" forensics page) === */
.rw-hero { background: linear-gradient(135deg, var(--bg2) 0%, rgba(57,255,20,0.04) 100%); border: 1.5px solid var(--green); border-radius: var(--radius); padding: 32px 36px; margin-bottom: 28px; box-shadow: 0 0 60px rgba(57,255,20,0.06); }
.rw-hero.warning { border-color: var(--orange); background: linear-gradient(135deg, var(--bg2) 0%, rgba(251,146,60,0.06) 100%); }
.rw-hero-eye { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; color: var(--green); text-transform: uppercase; margin-bottom: 10px; }
.rw-hero.warning .rw-hero-eye { color: var(--orange); }
.rw-hero-num { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(38px, 5.5vw, 64px); line-height: 1; letter-spacing: -2px; margin-bottom: 8px; color: var(--green); }
.rw-hero.warning .rw-hero-num { color: var(--orange); }
.rw-hero-sub { font-size: 17px; color: var(--text-dim); margin-bottom: 14px; line-height: 1.5; }

const spark = (...vals) => vals.map((v, i) => ({ x: i, y: v }));
const series = (start, days, drift, vol = 1) => {
  const out = []; let v = start;
  for (let i = 0; i < days; i++) {
    v += drift + (Math.sin(i*1.7)*vol) + (Math.cos(i*0.9)*vol*0.7);
    out.push({ x: i, y: Math.round(v*10)/10 });
  } return out;
};

// === Inline approval card — the website's "tap Approve from your truck" moment, IN the Brief ===
function InlineApprovalCard({ approval, persona }) {
  const [state, setState] = useState('pending'); // 'pending' | 'flashed' | 'approved' | 'rejected'

  function handle(action) {
    setState('flashed');
    setTimeout(() => setState(action === 'approve' ? 'approved' : 'rejected'), 700);
  }

  if (state === 'approved') {
    return (
      <div className="brief-appr-resolved">
        <span style={{fontSize:18}}>✓</span>
        <span>Approved by {persona.owner.split(' ')[0]} — posted just now</span>
        <span className="brief-appr-resolved-meta">audit logged · response live on {approval.channel || 'Google Business Profile'}</span>
      </div>
    );
  }
  if (state === 'rejected') {
    return (
      <div className="brief-appr-resolved" style={{background:'rgba(239,68,68,0.12)', borderColor:'var(--red)', color:'var(--red)'}}>
        <span style={{fontSize:18}}>✗</span>
        <span>Rejected · sent to advisor for manual handling</span>
      </div>
    );
  }

  return (
    <div className={'brief-appr' + (state === 'flashed' ? ' flashed' : '')}>
      <div className="brief-appr-eye">{approval.eye || 'AI DRAFT · ONE-TAP APPROVAL'}</div>
      <div className="brief-appr-draft">"{approval.draft}"</div>
      <div className="brief-appr-actions">
        <button className="appr-btn approve" onClick={() => handle('approve')}>✓ Approve & post</button>
        <button className="appr-btn edit">✎ Edit</button>
        <button className="appr-btn reject" onClick={() => handle('reject')}>✗ Reject</button>
      </div>
      <div className="brief-appr-meta">{approval.meta}</div>
    </div>
  );
}

function ScoreboardDrill({ persona, onBack }) {
  const [dim, setDim] = useState('Acquisition');
  const dimNames = persona.today.scoreboard.map(s => s.name);
  const dimData = persona.today.scoreboard.find(s => s.name === dim) || persona.today.scoreboard[0];

  // Generate a 90d series based on the existing 14d spark (extend it backward)
  const trend = useMemo(() => {
    const vals = dimData.spark.map(s => s.y);
    const first = vals[0];
    const out = [];
    for (let i = 0; i < 90 - vals.length; i++) {
      out.push({ x: i, y: first - (10 - Math.sin(i*0.4)*3) + (i*0.05) });
    }
    return [...out, ...dimData.spark.map((s, i) => ({ x: out.length + i, y: s.y }))];
  }, [dim, persona.id]);

  const sigs = persona.signalSets[dim] || persona.signalSets['Acquisition'] || [];
  const stroke = dimData.sentiment === 'up' ? 'var(--green)' : dimData.sentiment === 'down' ? 'var(--orange)' : 'var(--text-muted)';

  return (
    <>
      <span className="eyebrow">SCOREBOARD · {dim.toUpperCase()}</span>
      <h1 className="page-h2">{dim}</h1>
      <p className="page-lede">90-day trend. Underlying signals. Cohort comparison. Advisor commentary.</p>

      <div className="dim-tabs">
        {dimNames.map(n => <button key={n} className={'dim-tab' + (n === dim ? ' active' : '')} onClick={() => setDim(n)}>{n}</button>)}
      </div>

      <div className="bigchart">
        <div className="bigchart-head">
          <div>
            <div className="bigchart-title">{dim} · 90-day trend</div>
            <div className="bigchart-period">Mar 1 → Apr 28, 2026 · daily</div>
          </div>
          <div className={'bigchart-delta ' + dimData.sentiment}>{dimData.value}</div>
        </div>
        <div className="bigchart-body">
          <ResponsiveContainer width="100%" height="100%">
            <AreaChart data={trend} margin={{top:8, right:8, left:0, bottom:8}}>
              <defs>
                <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={stroke} stopOpacity={0.3}/>
                  <stop offset="100%" stopColor={stroke} stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.04)" />
              <XAxis dataKey="x" hide />
              <YAxis stroke="var(--text-muted)" fontSize={11} tickLine={false} axisLine={false} />
              <Tooltip contentStyle={{background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:8, fontSize:12}} cursor={{stroke: stroke, strokeDasharray: '3 3'}} />
              <Area type="monotone" dataKey="y" stroke={stroke} strokeWidth={2} fill="url(#grad)" isAnimationActive={true} animationDuration={1000} />
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>

      <div className="section-h">Signals composing {dim.toLowerCase()}</div>
      <div className="signals">
        {sigs.map((s, i) => (
          <div key={i} className="signal-card">
            <div className="signal-name">{s.name}</div>
            <div className="signal-value">{s.value}</div>
            <div className={'signal-delta ' + s.sentiment}>{s.delta} · vs prior 14d</div>
          </div>
        ))}
      </div>

      <div className="cohort-card">
        <div className="cohort-eye">COHORT COMPARISON · MOTHER BRAIN</div>
        <div className="cohort-line"><b>{persona.cohort.line.split('.')[0]}.</b> {persona.cohort.line.split('.').slice(1).join('.')}</div>
        <div style={{fontSize:12, color:'var(--text-muted)', marginTop:10, fontStyle:'italic'}}>{persona.cohort.source}</div>

// === Speech synthesis hook (real audio via browser's built-in voice) ===
function useSpeak() {
  const [playingId, setPlayingId] = useState(null);
  const utterRef = useRef(null);

  // pre-load voices for browsers that load asynchronously
  useEffect(() => {
    if (typeof window !== 'undefined' && window.speechSynthesis) {
      window.speechSynthesis.getVoices();
      const handler = () => window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = handler;
      return () => { window.speechSynthesis.onvoiceschanged = null; window.speechSynthesis.cancel(); };
    }
  }, []);

  function speak(id, text, opts = {}) {
    if (typeof window === 'undefined' || !window.speechSynthesis) return;
    if (playingId === id) { window.speechSynthesis.cancel(); setPlayingId(null); return; }
    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = opts.rate || 1.0;
    utter.pitch = opts.pitch || 1.0;
    utter.volume = 1.0;

    const voices = window.speechSynthesis.getVoices();
    // prefer high-quality female US-English voices
    const preferred = voices.find(v => /Samantha/i.test(v.name)) ||
                       voices.find(v => /Ava/i.test(v.name)) ||
                       voices.find(v => /Allison/i.test(v.name)) ||
                       voices.find(v => /Susan/i.test(v.name)) ||
                       voices.find(v => v.lang === 'en-US' && /female/i.test(v.name)) ||
                       voices.find(v => v.lang === 'en-US') ||
                       voices[0];
    if (preferred) utter.voice = preferred;

    utter.onstart = () => setPlayingId(id);
    utter.onend = () => setPlayingId(null);
    utter.onerror = () => setPlayingId(null);
    utterRef.current = utter;
    window.speechSynthesis.speak(utter);
  }

  return { speak, playingId };
}

// === LIVE WORKFORCE STREAM (Riverside Today) ===
function LiveWorkforceStream({ persona }) {
  const baseLog = persona.ticker || [];
  const [events, setEvents] = useState(baseLog.slice(0, 5));
  const [now, setNow] = useState(0);

  useEffect(() => {
    const intv = setInterval(() => setNow(n => n + 1), 11000); // tick every 11s
    return () => clearInterval(intv);
  }, []);

  useEffect(() => {
    if (now === 0) return;
    // Pick a random event from the bank, prepend with "just now" timestamp
    const fresh = baseLog[(now * 3) % baseLog.length];
    setEvents(prev => [{ ...fresh, time: 'just now', _id: now }, ...prev.slice(0, 9)]);
  }, [now]);

  if (!baseLog.length) return null;

  return (
    <div className="workforce-card">
      <div className="workforce-h">
        <div className="workforce-h-title">
          <span style={{fontSize:14}}>🛰️</span>
          <span>LIVE WORKFORCE · ALL 5 AGENTS · {persona.business.toUpperCase()}</span>
          <span className="workforce-h-live">● LIVE</span>
        </div>
        <div className="workforce-h-meta">refreshes every ~11 seconds · last 10 events</div>
      </div>
      <div className="workforce-stream">
        {events.map((e, i) => (
          <div key={(e._id || 'b') + '_' + i} className="wf-event">
            <span className="wf-time">{e.time}</span>
            <span className="wf-icon-cell">{e.icon}</span>
            <span className="wf-text">
              <span className="wf-agent">{e.agent}</span>{' '}<span dangerouslySetInnerHTML={{ __html: e.text }} />
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

// === LIVE TICKER (Today page · smaller version) ===
function LiveTicker({ persona }) {
  const baseLog = persona.ticker || [];
  const [events, setEvents] = useState(baseLog.slice(0, 5));
  const [now, setNow] = useState(0);

  useEffect(() => {
    const intv = setInterval(() => setNow(n => n + 1), 14000);
    return () => clearInterval(intv);
  }, []);

  useEffect(() => {
    if (now === 0) return;
    const fresh = baseLog[(now * 2) % baseLog.length];
    setEvents(prev => [{ ...fresh, time: 'just now', _id: now, _new: true }, ...prev.slice(0, 4)]);
  }, [now]);

  if (!baseLog.length) return null;

  return (
    <div className="live-ticker">
      <div className="live-ticker-h">
        <div className="live-ticker-title"><span className="live-dot"></span>LIVE · YOUR AI IS RUNNING</div>
        <div className="live-ticker-meta">last 5 events · auto-refresh</div>
      </div>
      <div className="live-ticker-events">
        {events.map((e, i) => (
          <div key={(e._id || 'b') + '_' + i} className={'live-ticker-row' + (e._new ? ' new' : '')}>
            <span className="lt-time">{e.time}</span>
            <span className="lt-icon">{e.icon}</span>
            <span className="lt-text"><span className="lt-agent">{e.agent}</span>{' · '}<span dangerouslySetInnerHTML={{ __html: e.text }} /></span>

        ))}

    </div>
  );
}

// ============================================================================
//  APP ROOT
// ============================================================================

const { useState, useEffect, useRef, useMemo } = React;

function App() {
  const [personaId, setPersonaId] = useState('acme');
  const [page, setPage] = useState('today');
  const [showToast, setShowToast] = useState(false);
  const [openLead, setOpenLead] = useState(null);
  const [showLiveCall, setShowLiveCall] = useState(false);
  const persona = PERSONAS[personaId];

  useEffect(() => {
    setShowToast(false); setOpenLead(null); setShowLiveCall(false);
    const t = setTimeout(() => setShowToast(true), 18000);
    return () => clearTimeout(t);
  }, [personaId]);

  useEffect(() => {
    if (!showToast) return;
    const t = setTimeout(() => setShowToast(false), 8000);
    return () => clearTimeout(t);
  }, [showToast]);

  const navItem = NAV.flatMap(g => g.items).find(i => i.id === page);
  const locked = navItem && !meetsTier(persona, navItem.minTier);

  function onNavigate(p) { setPage(p); window.scrollTo({ top: 0, behavior: 'smooth' }); }

  function renderPage() {
    if (locked) return <UpsellCard targetTier={navItem.minTier} onBack={() => setPage('today')} />;
    switch (page) {
      case 'today':       return <TodayPage persona={persona} onNavigate={onNavigate} onOpenLiveCall={() => setShowLiveCall(true)} />;
      case 'brief':       return <BriefArchive persona={persona} onSwitchPersona={setPersonaId} onNavigate={onNavigate} />;
      case 'scoreboard':  return <ScoreboardDrill persona={persona} onBack={() => setPage('today')} />;
      case 'pipeline':    return <PipelinePage persona={persona} onOpenLead={setOpenLead} />;
      case 'competitors': return <CompetitorIntelPage persona={persona} />;
      case 'revenue':     return <RevenueWatchPage persona={persona} />;
      case 'cohort':      return <MotherBrainCohortPage persona={persona} />;
      case 'approvals':   return <ApprovalsPage persona={persona} />;
      case 'connections': return <ConnectionsPage persona={persona} />;
      case 'voice':       return <BrandVoicePage persona={persona} />;
      case 'team':        return <TeamPage persona={persona} />;
      case 'billing':     return <BillingPage persona={persona} />;
      case 'settings':    return <SettingsPage persona={persona} />;
      case 'advisor':     return <AdvisorPage persona={persona} />;
      case 'help':        return <HelpPage persona={persona} />;
      default:            return <TodayPage persona={persona} onNavigate={onNavigate} />;
    }
  }

  return (
    <>
      <DemoBadge />
      <DemoBanner />
      <PersonaSwitcher currentId={personaId} onChange={setPersonaId} />
      <div className="app-shell">
        <Sidebar persona={persona} page={page} onNavigate={onNavigate} />
        <main>
          <TopBar persona={persona} />
          {renderPage()}
        </main>
      </div>
      {showToast && <Toast persona={persona} onDismiss={() => setShowToast(false)} />}
      {openLead && <LeadModal lead={openLead} onClose={() => setOpenLead(null)} />}
      {showLiveCall && <LiveCallModal persona={persona} onClose={() => setShowLiveCall(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
